<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3rd Person Town - Mouse Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px;
            user-select: none;
            pointer-events: none; /* Lets you click through the UI */
        }
        h1 { margin: 0 0 5px 0; font-size: 18px; color: #ffeb3b; }
        p { margin: 0; font-size: 14px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="ui">
        <h1>Web Town: Mouse Update</h1>
        <p><b>WASD:</b> Walk around</p>
        <p><b>Left Click + Drag:</b> Rotate Camera</p>
        <p><b>Scroll Wheel:</b> Zoom In/Out</p>
    </div>

    <script>
        // --- 1. Basic Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 8, 14); // Initial camera position

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- 2. Mouse Controls (OrbitControls) ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Adds smooth momentum to camera rotation
        controls.dampingFactor = 0.08;
        controls.enablePan = false; // Disables right-click dragging so camera stays locked on player
        controls.minDistance = 4; // Max zoom in
        controls.maxDistance = 30; // Max zoom out
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Prevents camera from going under the ground

        // --- 3. Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(30, 50, -30);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -50; dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50; dirLight.shadow.camera.bottom = -50;
        scene.add(dirLight);

        // --- 4. Environment Generation ---
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x55aa55, roughness: 0.8 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(16, 200), roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.05; 
        road.receiveShadow = true;
        scene.add(road);

        function createHouse(x, z, width, depth, height, color) {
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
            const house = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), mat);
            house.position.set(x, height / 2, z);
            house.castShadow = true;
            house.receiveShadow = true;
            scene.add(house);
            
            const roofGeo = new THREE.ConeGeometry(Math.max(width, depth) * 0.8, height * 0.5, 4);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.set(x, height + (height * 0.25), z);
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            scene.add(roof);
        }

        function createTree(x, z) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 3, 8), new THREE.MeshStandardMaterial({ color: 0x5d4037 }));
            trunk.position.set(x, 1.5, z);
            trunk.castShadow = true;
            scene.add(trunk);

            const leaves = new THREE.Mesh(new THREE.SphereGeometry(2.5, 8, 8), new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
            leaves.position.set(x, 4, z);
            leaves.castShadow = true;
            scene.add(leaves);
        }

        createHouse(-15, -10, 10, 10, 8, 0xe53935); 
        createHouse(15, 20, 12, 10, 12, 0x1e88e5);  
        createHouse(-18, 30, 8, 8, 6, 0xfdd835);   
        
        for(let i = -50; i < 50; i += 20) {
            createTree(-12, i);
            createTree(12, i + 10);
        }

        // --- 5. Character Construction ---
        const player = new THREE.Group();
        scene.add(player);

        const skinMat = new THREE.MeshStandardMaterial({ color: 0xf6d152 }); 
        const shirtMat = new THREE.MeshStandardMaterial({ color: 0x0055af }); 
        const pantsMat = new THREE.MeshStandardMaterial({ color: 0x6e9927 }); 

        const torso = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 1), shirtMat);
        torso.position.y = 3;
        torso.castShadow = true;
        player.add(torso);

        const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), skinMat);
        head.position.y = 1.6;
        head.castShadow = true;
        torso.add(head); 

        const armGeo = new THREE.BoxGeometry(1, 2, 1); armGeo.translate(0, -1, 0); 
        const legGeo = new THREE.BoxGeometry(1, 2, 1); legGeo.translate(0, -1, 0); 

        const leftArm = new THREE.Mesh(armGeo, skinMat); leftArm.position.set(-1.5, 1, 0); leftArm.castShadow = true; torso.add(leftArm);
        const rightArm = new THREE.Mesh(armGeo, skinMat); rightArm.position.set(1.5, 1, 0); rightArm.castShadow = true; torso.add(rightArm);
        const leftLeg = new THREE.Mesh(legGeo, pantsMat); leftLeg.position.set(-0.5, 2, 0); leftLeg.castShadow = true; player.add(leftLeg);
        const rightLeg = new THREE.Mesh(legGeo, pantsMat); rightLeg.position.set(0.5, 2, 0); rightLeg.castShadow = true; player.add(rightLeg);

        // --- 6. Keyboard Input ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 7. Animation & Game Loop ---
        const moveSpeed = 0.2;
        const clock = new THREE.Clock();
        let walkTime = 0; 

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            let isMoving = false;
            const moveDir = new THREE.Vector3(0, 0, 0);

            if (keys.w) { moveDir.z -= 1; isMoving = true; }
            if (keys.s) { moveDir.z += 1; isMoving = true; }
            if (keys.a) { moveDir.x -= 1; isMoving = true; }
            if (keys.d) { moveDir.x += 1; isMoving = true; }

            if (isMoving) {
                moveDir.normalize();
                
                // Move Player
                player.position.x += moveDir.x * moveSpeed;
                player.position.z += moveDir.z * moveSpeed;

                // Move Camera by the exact same amount so it follows the player
                camera.position.x += moveDir.x * moveSpeed;
                camera.position.z += moveDir.z * moveSpeed;

                const targetAngle = Math.atan2(moveDir.x, moveDir.z);
                let diff = targetAngle - player.rotation.y;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                player.rotation.y += diff * 0.15;

                walkTime += delta * 15; 
                const swing = Math.sin(walkTime) * 0.8;
                leftArm.rotation.x = swing; rightArm.rotation.x = -swing;
                leftLeg.rotation.x = -swing; rightLeg.rotation.x = swing;
                torso.position.y = 3 + Math.abs(Math.sin(walkTime)) * 0.1;
            } else {
                leftArm.rotation.x *= 0.8; rightArm.rotation.x *= 0.8;
                leftLeg.rotation.x *= 0.8; rightLeg.rotation.x *= 0.8;
                torso.position.y = 3; walkTime = 0;
            }

            // Update Mouse Camera Controls
            controls.target.copy(player.position);
            controls.target.y += 2; // Make the camera look at the character's head/torso, not their feet
            controls.update(); // Required for the damping (smoothness) to work

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
